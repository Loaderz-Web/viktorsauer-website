<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Leichenklatscher | Viktor Sauer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            color: #c4c4c4;
            font-family: 'Special Elite', monospace;
            min-height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }

        /* ========================================
           CEMETERY BACKGROUND
           ======================================== */
        .cemetery-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(20, 40, 20, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(15, 25, 15, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 80%, rgba(15, 25, 15, 0.3) 0%, transparent 40%),
                linear-gradient(180deg, #0d1a0d 0%, #0a0a0a 40%, #050505 100%);
            z-index: 0;
        }

        .fog {
            position: fixed;
            bottom: 0; left: 0;
            width: 200%; height: 30%;
            background: linear-gradient(0deg, rgba(80,90,80,0.15) 0%, transparent 100%);
            animation: fogDrift 20s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes fogDrift {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-25%); }
        }

        /* ========================================
           GAME CONTAINER
           ======================================== */
        .game-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* ========================================
           TITLE
           ======================================== */
        .game-title {
            font-family: 'Creepster', cursive;
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: #8b0000;
            text-shadow: 
                0 0 10px rgba(139, 0, 0, 0.6),
                0 0 30px rgba(139, 0, 0, 0.3),
                2px 2px 0 #000;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-align: center;
        }

        /* ========================================
           HUD (Score, Timer, Combo)
           ======================================== */
        .hud {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 14px;
            text-align: center;
            min-width: 90px;
        }

        .hud-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-value {
            font-family: 'Creepster', cursive;
            font-size: 1.6rem;
            color: #b22222;
            text-shadow: 0 0 8px rgba(178, 34, 34, 0.4);
        }

        #timer.warning {
            color: #ff4444;
            animation: timerPulse 0.5s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .combo-display {
            color: #ff6600 !important;
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.5) !important;
        }

        /* ========================================
           GAME GRID
           ======================================== */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 420px;
            width: 100%;
            margin-bottom: 16px;
        }

        /* ========================================
           GRAVE / HOLE
           ======================================== */
        .grave {
            position: relative;
            aspect-ratio: 1;
            cursor: crosshair;
            overflow: hidden;
            border-radius: 8px;
        }

        .grave-bg {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(0deg, #1a1208 0%, #2a1f10 60%, transparent 100%);
            border-radius: 0 0 8px 8px;
            z-index: 2;
        }

        .grave-dirt {
            position: absolute;
            bottom: 0; left: 5%;
            width: 90%; height: 12%;
            background: radial-gradient(ellipse at 50% 100%, #3a2a15 0%, #2a1f10 60%, transparent 100%);
            border-radius: 50% 50% 0 0;
            z-index: 4;
        }

        /* Grabstein */
        .tombstone {
            position: absolute;
            top: 8%; left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 40%;
            background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 50%, #2a2a2a 100%);
            border-radius: 50% 50% 2px 2px;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.6);
        }

        .tombstone::before {
            content: '†';
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: #555;
        }

        /* ========================================
           ZOMBIE
           ======================================== */
        .zombie {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 60%;
            height: 65%;
            z-index: 3;
            transition: none;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .zombie.rising {
            animation: zombieRise 0.35s ease-out forwards;
        }

        .zombie.sinking {
            animation: zombieSink 0.3s ease-in forwards;
        }

        .zombie.whacked {
            animation: zombieWhacked 0.25s ease-out forwards;
        }

        @keyframes zombieRise {
            0% { transform: translateX(-50%) translateY(100%); }
            80% { transform: translateX(-50%) translateY(-5%); }
            100% { transform: translateX(-50%) translateY(0%); }
        }

        @keyframes zombieSink {
            0% { transform: translateX(-50%) translateY(0%); }
            100% { transform: translateX(-50%) translateY(100%); }
        }

        @keyframes zombieWhacked {
            0% { transform: translateX(-50%) translateY(0%) scale(1); opacity: 1; }
            30% { transform: translateX(-50%) translateY(-10%) scale(1.1); }
            100% { transform: translateX(-50%) translateY(100%) scale(0.7); opacity: 0.3; }
        }

        /* Zombie Kopf (CSS Art) */
        .zombie-head {
            width: 70%;
            aspect-ratio: 0.85;
            background: linear-gradient(180deg, #4a6b3a 0%, #3d5a30 40%, #2d4a22 100%);
            border-radius: 45% 45% 40% 40%;
            position: relative;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
        }

        /* Augen */
        .zombie-eyes {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            display: flex;
            justify-content: space-between;
        }

        .zombie-eye {
            width: 30%;
            aspect-ratio: 1;
            background: radial-gradient(circle at 40% 40%, #ff4444, #8b0000);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 0, 0, 0.5);
        }

        .zombie-eye::after {
            content: '';
            position: absolute;
            width: 35%;
            height: 35%;
            background: #000;
            border-radius: 50%;
            top: 30%;
            left: 30%;
        }

        /* Mund */
        .zombie-mouth {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 45%;
            height: 18%;
            background: #1a0000;
            border-radius: 0 0 50% 50%;
            overflow: hidden;
        }

        .zombie-teeth {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .zombie-tooth {
            width: 20%;
            height: 5px;
            background: #ddd;
            border-radius: 0 0 2px 2px;
        }

        /* Zombie Körper */
        .zombie-body {
            width: 80%;
            height: 40%;
            background: linear-gradient(180deg, #3d5a30 0%, #2d4a22 100%);
            border-radius: 5px 5px 0 0;
            margin-top: -2px;
        }

        /* Zombie Arme */
        .zombie-arms {
            position: absolute;
            top: 55%;
            width: 120%;
            display: flex;
            justify-content: space-between;
        }

        .zombie-arm {
            width: 22%;
            height: 30px;
            background: #3d5a30;
            border-radius: 4px;
        }

        .zombie-arm.left {
            transform: rotate(-20deg);
            transform-origin: right center;
        }

        .zombie-arm.right {
            transform: rotate(20deg);
            transform-origin: left center;
        }

        /* Spezial-Zombie: schneller, rot leuchtend */
        .grave.fast-zombie .zombie-head {
            background: linear-gradient(180deg, #6b3a3a 0%, #5a3030 40%, #4a2222 100%);
        }

        .grave.fast-zombie .zombie-eye {
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.8);
        }

        /* ========================================
           HIT EFFECT
           ======================================== */
        .hit-effect {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            font-family: 'Creepster', cursive;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            animation: hitPop 0.6s ease-out forwards;
        }

        @keyframes hitPop {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            30% { transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }

        .blood-splat {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 5;
            pointer-events: none;
            background: radial-gradient(circle at var(--x) var(--y), rgba(139, 0, 0, 0.5) 0%, transparent 50%);
            animation: splatFade 0.8s ease-out forwards;
        }

        @keyframes splatFade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ========================================
           MISS EFFECT
           ======================================== */
        .miss-effect {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            font-family: 'Creepster', cursive;
            font-size: 1.2rem;
            color: #666;
            animation: missFade 0.5s ease-out forwards;
        }

        @keyframes missFade {
            0% { opacity: 0.8; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -70%); }
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            font-family: 'Creepster', cursive;
            font-size: 1.4rem;
            padding: 12px 40px;
            border: 2px solid #8b0000;
            background: rgba(139, 0, 0, 0.2);
            color: #b22222;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s;
            text-shadow: 0 0 8px rgba(139, 0, 0, 0.3);
        }

        .btn:hover, .btn:active {
            background: rgba(139, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.3);
            transform: scale(1.05);
        }

        /* ========================================
           SCREENS
           ======================================== */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
        }

        .screen.active {
            display: flex;
        }

        .start-subtitle {
            font-size: 0.95rem;
            color: #555;
            max-width: 300px;
            line-height: 1.5;
        }

        .final-score {
            font-family: 'Creepster', cursive;
            font-size: 3rem;
            color: #b22222;
            text-shadow: 0 0 15px rgba(178, 34, 34, 0.5);
        }

        .stats-line {
            font-size: 0.9rem;
            color: #777;
        }

        .highscore-label {
            font-size: 0.8rem;
            color: #555;
            margin-top: 4px;
        }

        .highscore-value {
            font-family: 'Creepster', cursive;
            font-size: 1.3rem;
            color: #ff6600;
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.3);
        }

        .new-record {
            color: #ff6600;
            font-family: 'Creepster', cursive;
            font-size: 1.1rem;
            animation: recordPulse 1s ease-in-out infinite;
        }

        @keyframes recordPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ========================================
           FOOTER
           ======================================== */
        .game-footer {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 1px;
            z-index: 10;
        }

        .game-footer a {
            color: #555;
            text-decoration: none;
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-height: 650px) {
            .game-title { font-size: 1.6rem; margin-bottom: 4px; }
            .hud { margin-bottom: 6px; gap: 10px; }
            .hud-item { padding: 4px 10px; min-width: 70px; }
            .hud-value { font-size: 1.2rem; }
            .game-grid { gap: 8px; max-width: 340px; }
        }

        @media (max-width: 380px) {
            .game-grid { gap: 8px; max-width: 300px; }
        }

        /* ========================================
           MUTE BUTTON
           ======================================== */
        .mute-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: border-color 0.2s;
        }

        .mute-btn:hover {
            border-color: #8b0000;
        }

        /* ========================================
           SCREEN SHAKE
           ======================================== */
        .shake {
            animation: screenShake 0.15s ease-out;
        }

        @keyframes screenShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 2px); }
            50% { transform: translate(3px, -2px); }
            75% { transform: translate(-2px, 1px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

<div class="cemetery-bg"></div>
<div class="fog"></div>

<div class="mute-btn" id="muteBtn" onclick="toggleMute()">🔇</div>

<div class="game-wrapper" id="gameWrapper">

    <!-- ========================================
         START SCREEN
         ======================================== -->
    <div class="screen active" id="startScreen">
        <div class="game-title">Leichenklatscher</div>
        <div class="start-subtitle">
            Sie kommen aus der Erde.<br>
            Klatsch sie zurück, bevor es zu spät ist.
        </div>
        <div style="margin-top: 10px;">
            <div class="highscore-label">HIGHSCORE</div>
            <div class="highscore-value" id="startHighscore">0</div>
        </div>
        <button class="btn" onclick="startGame()">Losklatschen!</button>
    </div>

    <!-- ========================================
         GAME SCREEN
         ======================================== -->
    <div class="screen" id="gameScreen">
        <div class="game-title" style="font-size: clamp(1.4rem, 4vw, 2rem); margin-bottom: 4px;">
            Leichenklatscher
        </div>

        <div class="hud">
            <div class="hud-item">
                <div class="hud-label">Opfer</div>
                <div class="hud-value" id="score">0</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">Zeit</div>
                <div class="hud-value" id="timer">30</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">Combo</div>
                <div class="hud-value combo-display" id="combo">x1</div>
            </div>
        </div>

        <div class="game-grid" id="gameGrid"></div>
    </div>

    <!-- ========================================
         GAME OVER SCREEN
         ======================================== -->
    <div class="screen" id="endScreen">
        <div class="game-title">Feierabend!</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats-line" id="statsLine">0 Zombies erschlagen | Beste Combo: x1</div>
        <div id="newRecordLine"></div>
        <div>
            <div class="highscore-label">HIGHSCORE</div>
            <div class="highscore-value" id="endHighscore">0</div>
        </div>
        <button class="btn" onclick="startGame()">Nochmal klatschen!</button>
    </div>

</div>

<div class="game-footer">
    <a href="/">← viktorsauer.org</a>
</div>

<!-- ========================================
     GAME LOGIC
     ======================================== -->
<script>
    // ========================================
    // STATE
    // ========================================
    let score = 0;
    let timeLeft = 30;
    let combo = 0;
    let maxCombo = 0;
    let totalWhacked = 0;
    let gameInterval = null;
    let spawnTimeout = null;
    let gameActive = false;
    let highscore = 0;

    // Highscore laden
    try {
        highscore = parseInt(localStorage.getItem('leichenklatscherHighscore') || '0');
    } catch(e) {
        highscore = 0;
    }
    document.getElementById('startHighscore').textContent = highscore;

    // ========================================
    // SOUND ENGINE (Web Audio API)
    // ========================================
    let audioCtx = null;
    let muted = true;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function toggleMute() {
        muted = !muted;
        document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
    }

    function playSound(type) {
        if (muted || !audioCtx) return;
        try {
            const now = audioCtx.currentTime;

            if (type === 'whack') {
                // Sattes Klatsch-Geräusch (Noise Burst + tiefem Thump)
                const bufferSize = audioCtx.sampleRate * 0.08;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = 800;

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.4, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(now);

                // Tiefer Thump
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                const oscGain = audioCtx.createGain();
                oscGain.gain.setValueAtTime(0.3, now);
                oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.connect(oscGain);
                oscGain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.12);

            } else if (type === 'miss') {
                // Kurzes dumpfes Wusch
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.12);

            } else if (type === 'rise') {
                // Zombie taucht auf: kurzes tiefes Grollen
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(60, now);
                osc.frequency.linearRampToValueAtTime(90, now + 0.2);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 300;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.3);

            } else if (type === 'gameover') {
                // Düsterer Abschluss: absteigender Ton
                [200, 160, 120].forEach(function(freq, i) {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0, now + i * 0.2);
                    gain.gain.linearRampToValueAtTime(0.15, now + i * 0.2 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.2 + 0.4);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + i * 0.2);
                    osc.stop(now + i * 0.2 + 0.45);
                });

            } else if (type === 'combo') {
                // Kurzer hoher Pling bei Combo-Aufbau
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600 + combo * 80, now);
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.12);
            }
        } catch(e) {}
    }

    // ========================================
    // GRID AUFBAUEN
    // ========================================
    const grid = document.getElementById('gameGrid');

    for (let i = 0; i < 9; i++) {
        const grave = document.createElement('div');
        grave.className = 'grave';
        grave.dataset.index = i;
        grave.innerHTML = `
            <div class="tombstone"></div>
            <div class="zombie" id="zombie-${i}">
                <div class="zombie-head">
                    <div class="zombie-eyes">
                        <div class="zombie-eye"></div>
                        <div class="zombie-eye"></div>
                    </div>
                    <div class="zombie-mouth">
                        <div class="zombie-teeth">
                            <div class="zombie-tooth"></div>
                            <div class="zombie-tooth"></div>
                            <div class="zombie-tooth"></div>
                        </div>
                    </div>
                </div>
                <div class="zombie-body"></div>
            </div>
            <div class="grave-bg"></div>
            <div class="grave-dirt"></div>
        `;

        // Klick/Touch Handler
        grave.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            handleWhack(i, e);
        });

        grid.appendChild(grave);
    }

    // ========================================
    // GAME START
    // ========================================
    function startGame() {
        score = 0;
        timeLeft = 30;
        combo = 0;
        maxCombo = 0;
        totalWhacked = 0;
        gameActive = true;

        initAudio();

        document.getElementById('score').textContent = '0';
        document.getElementById('timer').textContent = '30';
        document.getElementById('timer').classList.remove('warning');
        document.getElementById('combo').textContent = 'x1';

        showScreen('gameScreen');

        // Alle Zombies zurücksetzen
        for (let i = 0; i < 9; i++) {
            const zombie = document.getElementById('zombie-' + i);
            zombie.className = 'zombie';
            const grave = zombie.closest('.grave');
            grave.classList.remove('fast-zombie');
            grave.dataset.active = 'false';
        }

        // Timer starten
        gameInterval = setInterval(function() {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;

            if (timeLeft <= 10) {
                document.getElementById('timer').classList.add('warning');
            }

            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);

        // Zombies spawnen
        scheduleSpawn();
    }

    // ========================================
    // SPAWN LOGIK
    // ========================================
    function scheduleSpawn() {
        if (!gameActive) return;

        // Wird schneller über die Zeit
        const elapsed = 30 - timeLeft;
        const minDelay = Math.max(300, 800 - elapsed * 20);
        const maxDelay = Math.max(600, 1500 - elapsed * 30);
        const delay = minDelay + Math.random() * (maxDelay - minDelay);

        spawnTimeout = setTimeout(function() {
            if (!gameActive) return;
            spawnZombie();
            scheduleSpawn();
        }, delay);
    }

    function spawnZombie() {
        // Freies Grab finden
        const freeGraves = [];
        for (let i = 0; i < 9; i++) {
            const grave = document.querySelectorAll('.grave')[i];
            if (grave.dataset.active !== 'true') {
                freeGraves.push(i);
            }
        }

        if (freeGraves.length === 0) return;

        const idx = freeGraves[Math.floor(Math.random() * freeGraves.length)];
        const grave = document.querySelectorAll('.grave')[idx];
        const zombie = document.getElementById('zombie-' + idx);

        // Schneller Zombie? (ab 10 Sekunden, 25% Chance)
        const elapsed = 30 - timeLeft;
        const isFast = elapsed > 10 && Math.random() < 0.25;

        grave.dataset.active = 'true';
        if (isFast) grave.classList.add('fast-zombie');

        zombie.className = 'zombie rising';
        playSound('rise');

        // Wie lange sichtbar (schnelle Zombies = kürzer)
        const visibleTime = isFast ? 800 : Math.max(900, 1600 - elapsed * 25);

        setTimeout(function() {
            if (grave.dataset.active === 'true') {
                // Nicht erwischt! Combo zurücksetzen
                combo = 0;
                document.getElementById('combo').textContent = 'x1';
                sinkZombie(idx);
            }
        }, visibleTime);
    }

    function sinkZombie(idx) {
        const grave = document.querySelectorAll('.grave')[idx];
        const zombie = document.getElementById('zombie-' + idx);

        zombie.className = 'zombie sinking';

        setTimeout(function() {
            zombie.className = 'zombie';
            grave.dataset.active = 'false';
            grave.classList.remove('fast-zombie');
        }, 300);
    }

    // ========================================
    // WHACK!
    // ========================================
    function handleWhack(idx, event) {
        if (!gameActive) return;

        const grave = document.querySelectorAll('.grave')[idx];
        const zombie = document.getElementById('zombie-' + idx);

        if (grave.dataset.active === 'true') {
            // TREFFER!
            grave.dataset.active = 'hit';

            combo++;
            totalWhacked++;
            if (combo > maxCombo) maxCombo = combo;

            // Punkte: Basis 10, Combo-Multiplikator, Fast-Zombie Bonus
            const isFast = grave.classList.contains('fast-zombie');
            const basePoints = isFast ? 25 : 10;
            const multiplier = Math.min(combo, 5);
            const points = basePoints * multiplier;
            score += points;

            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = 'x' + Math.min(combo, 5);

            // Whack-Animation
            zombie.className = 'zombie whacked';
            playSound('whack');
            if (combo > 1) playSound('combo');

            // Hit-Effekt
            const hitEl = document.createElement('div');
            hitEl.className = 'hit-effect';
            hitEl.textContent = '+' + points;
            grave.appendChild(hitEl);

            // Blut-Splatter
            const rect = grave.getBoundingClientRect();
            const x = event ? ((event.clientX - rect.left) / rect.width * 100) : 50;
            const y = event ? ((event.clientY - rect.top) / rect.height * 100) : 50;

            const splatEl = document.createElement('div');
            splatEl.className = 'blood-splat';
            splatEl.style.setProperty('--x', x + '%');
            splatEl.style.setProperty('--y', y + '%');
            grave.appendChild(splatEl);

            // Screen Shake
            document.getElementById('gameWrapper').classList.add('shake');
            setTimeout(function() {
                document.getElementById('gameWrapper').classList.remove('shake');
            }, 150);

            // Aufräumen
            setTimeout(function() {
                zombie.className = 'zombie';
                grave.dataset.active = 'false';
                grave.classList.remove('fast-zombie');
                if (hitEl.parentNode) hitEl.remove();
                if (splatEl.parentNode) splatEl.remove();
            }, 400);

        } else {
            // DANEBEN! Combo weg
            if (combo > 0) {
                combo = 0;
                document.getElementById('combo').textContent = 'x1';
            }

            const missEl = document.createElement('div');
            missEl.className = 'miss-effect';
            missEl.textContent = 'Daneben!';
            grave.appendChild(missEl);
            playSound('miss');

            setTimeout(function() {
                if (missEl.parentNode) missEl.remove();
            }, 500);
        }
    }

    // ========================================
    // GAME OVER
    // ========================================
    function endGame() {
        gameActive = false;
        clearInterval(gameInterval);
        clearTimeout(spawnTimeout);
        playSound('gameover');

        // Alle aktiven Zombies versenken
        for (let i = 0; i < 9; i++) {
            const grave = document.querySelectorAll('.grave')[i];
            if (grave.dataset.active === 'true') {
                sinkZombie(i);
            }
        }

        // Highscore?
        let isNewRecord = false;
        if (score > highscore) {
            highscore = score;
            isNewRecord = true;
            try {
                localStorage.setItem('leichenklatscherHighscore', highscore.toString());
            } catch(e) {}
        }

        // Kurze Pause, dann Endscreen
        setTimeout(function() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('statsLine').textContent =
                totalWhacked + ' Zombies erschlagen | Beste Combo: x' + Math.min(maxCombo, 5);
            document.getElementById('endHighscore').textContent = highscore;

            if (isNewRecord && score > 0) {
                document.getElementById('newRecordLine').innerHTML =
                    '<div class="new-record">⚰️ Neuer Rekord! ⚰️</div>';
            } else {
                document.getElementById('newRecordLine').innerHTML = '';
            }

            showScreen('endScreen');
        }, 600);
    }

    // ========================================
    // SCREEN WECHSEL
    // ========================================
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(function(s) {
            s.classList.remove('active');
        });
        document.getElementById(id).classList.add('active');
    }

    // ========================================
    // PREVENT ZOOM ON DOUBLE TAP (Mobile)
    // ========================================
    document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    let lastTap = 0;
    document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTap < 300) e.preventDefault();
        lastTap = now;
    }, { passive: false });
</script>

</body>
