    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Creepster&display=swap');
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #c4b59d;
            font-family: 'Special Elite', 'Courier New', monospace;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, #1a1510 0%, #0a0a0a 70%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
        }
        
        #game-container {

        #story {
            font-size: 15px;

            margin-bottom: 25px;
            min-height: 250px;
            padding: 25px;

            border-left: 3px solid #3d3428;
            white-space: pre-line;
        }
        
        #story strong {
            color: #d4c4a8;

        .choice:hover {

        }
        
        .choice:active {
            transform: translateX(3px);
        }
        
        #rain-overlay {
            position: fixed;
            top: 0;

            width: 100%;

            z-index: 1000;
        }
        
        @keyframes rain {
            0% { background-position: 0 0; }
            100% { background-position: 20px 100px; }
        }
        
        .flash {
            animation: lightning 0.1s ease-out;
        }
        
        @keyframes lightning {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(255,255,255,0.1); }
        }
        
        input[type="text"] {
            background: #0d0b09;
            color: #c4b59d;

        .stats {

        #book-link a {

        }
        
        #book-link a:hover {

        }
        
        .warning {

        .whisper {

<body>
    <div id="rain-overlay"></div>
    
    <div id="game-container">
        <h1>🩸 ROADKILL 🩸</h1>
        <div class="subtitle">Der Kannibalenhügel , ein interaktives Prequel</div>
        
        <div class="stats">
            <span>👤 Du</span>
            <span id="char-alex">👤 Alex</span>
            <span id="char-mia">👤 Mia</span>
            <span id="char-jake">👤 Jake</span>
            <span id="char-tiffany">👤 Tiffany</span>
        </div>
        
        <div id="story"></div>
        <div id="choices"></div>
        
        <div id="book-link">
            <p>Die Geschichte geht weiter...</p>
            <a href="https://www.amazon.de/dp/B0FPWQY627" target="_blank">📖 ROADKILL: Der Kannibalenhügel , jetzt auf Amazon</a>
        </div>
    </div>
    
    <script>
        // ================================================
        // ROADKILL - DER KANNIBALENHÜGEL
        // Ein Text-Adventure Teaser für das Buch
        // ================================================
        
        let playerName = "Du";
        let gameState = {
            scene: "intro",
            trustLevel: 0,      // Wie sehr vertraust du der Familie?
            suspicion: 0,       // Wie misstrauisch bist du?
            ateStew: false,     // Hast du den Eintopf gegessen?
            sawSkull: false,    // Hast du den Tierschädel gesehen?
            heardGrowl: false,  // Hast du das Knurren gehört?
            askedPhone: 0,      // Wie oft nach Telefon gefragt?
            rainActive: false
        };
        
        // ================================================
        // UTILITY FUNCTIONS
        // ================================================
        
        function showStory(text) {
            document.getElementById('story').innerHTML = text;
        }
        
        function clearChoices() {
            document.getElementById('choices').innerHTML = '';
        }
        
        function addChoice(text, callback) {
            const button = document.createElement('button');
            button.className = 'choice';
            button.innerHTML = text;
            button.onclick = callback;
            document.getElementById('choices').appendChild(button);
        }
        
        function setRain(active) {
            document.getElementById('rain-overlay').style.opacity = active ? '1' : '0';
            gameState.rainActive = active;
        }
        
        function flash() {
            document.body.classList.add('flash');
            setTimeout(() => document.body.classList.remove('flash'), 100);
        }
        
        function thunder() {
            flash();
            // Could add sound here
        }
        
        // ================================================
        // GAME SCENES
        // ================================================
        
        const scenes = {
            
            // --- INTRO ---
            intro: function() {
                showStory(`<strong>Crystal Lake, irgendwo in der amerikanischen Wildnis.</strong>

Ein Wochenendtrip mit Freunden. Was kann schon schiefgehen?

Du sitzt auf dem Rücksitz eines 1969er Camaro, eingequetscht zwischen Mia und Tiffany. Der Regen trommelt aufs Dach. Alex flucht am Steuer, während die Scheibenwischer kaum gegen die Wassermassen ankommen.

"Verdammtes Wetter", knurrt er.

Jake neben ihm kippt sein drittes Bier. "Chill mal, Alter. Wir sind gleich da."

Tiffany checkt zum hundertsten Mal ihr Handy. "Kein Empfang. Seit einer Stunde schon."

Mia, neben dir, starrt auf eine zerknitterte Karte. "Die Abzweigung müsste... irgendwo hier sein."

Tiffany auf deiner anderen Seite schaut nervös aus dem Fenster.

Und du? Du hast ein ungutes Gefühl.`);
                
                clearChoices();
                addChoice('"Vielleicht sollten wir umkehren?"', () => goScene('suggest_turn'));
                addChoice('"Fahr einfach weiter, Jake."', () => goScene('car_trouble'));
                addChoice('Schweigend aus dem Fenster starren', () => goScene('window_stare'));
            },
            
            suggest_turn: function() {
                gameState.suspicion++;
                showStory(`"Vielleicht sollten wir umkehren?"

Jake lacht höhnisch. "Umkehren? Wir sind fast da!"

"Woher willst du das wissen?", fragt Mia leise. "Wir haben seit Ewigkeiten kein Schild mehr gesehen."

Alex schüttelt den Kopf und tritt aufs Gas. "Jake hat recht. Jetzt noch umdrehen wäre Wahnsinn."

HUUUUUP!

Ein Blitz erhellt den Himmel, und für einen Sekundenbruchteil siehst du etwas am Straßenrand. Eine Gestalt? Ein Tier? 

Dann ist es wieder dunkel.

"Was war das?!", kreischt Tiffany.

Bevor jemand antworten kann, hustet der Motor. Einmal. Zweimal.

Dann Stille.`);
                
                thunder();
                clearChoices();
                addChoice('"Das ist nicht gut..."', () => goScene('car_dead'));
            },
            
            window_stare: function() {
                showStory(`Du starrst in die Dunkelheit hinaus.

Der Regen verwischt alles zu grauen Schlieren. Bäume ziehen vorbei wie dunkle Wächter. Ab und zu erhellt ein Blitz die Landschaft, kahle Äste, die wie Klauen in den Himmel greifen.

Dann siehst du es.

Nur für einen Moment, im Licht eines Blitzes: Eine Gestalt am Straßenrand. Aufrecht. Reglos. Sie scheint direkt in eure Richtung zu starren.

Du blinzelst, weg.

"Habt ihr das ..."

KNACK. STOTTER. STILLE.

Der Motor ist tot.`);
                
                thunder();
                clearChoices();
                addChoice('"Da war jemand am Straßenrand!"', () => goScene('car_dead_saw'));
                addChoice('Den Mund halten', () => goScene('car_dead'));
            },
            
            car_trouble: function() {
                showStory(`"Fahr einfach weiter, Alex."

"Genau das hab ich vor", murmelt er und tritt aufs Gas.

Der Camaro schießt vorwärts, Regenwasser spritzend. Die Scheinwerfer bohren sich in die Dunkelheit, enthüllen nichts als nasse Straße und endlosen Wald.

Dann, ein Husten. Ein Stottern.

"Was zum ..." Alex tritt aufs Gaspedal. Nichts.

Der Motor stirbt.

Der Wagen rollt aus, kommt zum Stehen. Um euch herum nur der prasselnde Regen und das Heulen des Windes.

"Scheiße", flüstert Alex.`);
                
                setRain(true);
                clearChoices();
                addChoice('"Jake, was hast du gemacht?"', () => goScene('car_dead'));
            },
            
            car_dead: function() {
                showStory(`Der Motor ist tot. Endgültig.

Alex dreht den Schlüssel. Klick. Klick. Nichts.

"Das kann nicht sein", murmelt er. "Wir haben gerade erst getankt!"

"Vielleicht ist es die Feuchtigkeit?", versucht Mia. "Der Regen..."

Jake kippt sein Bier. "Alter, dein Schrottwagen hat uns im Stich gelassen."

Ihr sitzt in der Dunkelheit. Der Regen hämmert aufs Dach wie tausend kleine Fäuste, die eingelassen werden wollen.

"Was jetzt?", fragt Tiffany mit zitternder Stimme.

Mia zeigt nach vorne. "Da. Seht ihr das?"

In der Ferne, kaum sichtbar durch den Regen, ein Lichtpunkt. Irgendwo im Wald.`);
                
                clearChoices();
                addChoice('"Da ist jemand. Wir sollten um Hilfe bitten."', () => goScene('before_walk'));
                addChoice('"Im Auto bleiben. Bis der Sturm nachlässt."', () => goScene('stay_car'));
                addChoice('"Ich traue dem nicht. Kein Haus hier draußen..."', () => goScene('suspicious_light'));
            },
            
            car_dead_saw: function() {
                gameState.suspicion++;
                gameState.sawSkull = true;
                
                showStory(`"Da war jemand am Straßenrand!"

Alle starren dich an.

"Was?", fragt Alex. "Ich hab nichts gesehen."

"Da stand jemand. Eine Gestalt. Sie hat uns... beobachtet."

Tiffany umklammert Jakes Arm. "Das ist gruselig. Lass uns hier weg."

"Womit?", schnaubt Jake und zeigt auf das tote Armaturenbrett. "Der Wagen ist im Arsch!"

Mia zeigt nach vorne. "Da. Ein Licht."

Ihr seht es alle, ein schwacher Schimmer, irgendwo im Wald. Ein Haus? Eine Hütte?

Dein Magen zieht sich zusammen. Das Licht ist genau in der Richtung, wo du die Gestalt gesehen hast.`);
                
                clearChoices();
                addChoice('"Das Licht... da stand die Gestalt."', () => goScene('suspicious_light'));
                addChoice('Die anderen drängen, loszugehen', () => goScene('before_walk'));
            },
            
            stay_car: function() {
                showStory(`"Lasst uns im Auto bleiben."

"Bis wann?", fragt Alex. "Wir haben keine Heizung, und es wird kälter."

Er hat recht. Die Kälte kriecht bereits in den Wagen. Tiffany zittert sichtbar.

"Außerdem", fügt Mia hinzu, "wer weiß, wann jemand diese Straße benutzt. Wir haben seit einer Stunde kein anderes Auto gesehen."

Der Regen wird stärker. Ein Blitz erhellt die Nacht, gefolgt von einem Donnerschlag, der den Wagen erzittern lässt.

Das Licht im Wald ist immer noch da. Einladend. Warm.

Oder ist es das?`);
                
                thunder();
                clearChoices();
                addChoice('"Okay. Gehen wir."', () => goScene('before_walk'));
                addChoice('"Geht ihr. Ich bleib hier."', () => goScene('stay_alone'));
            },
            
            stay_alone: function() {
                showStory(`"Geht ihr. Ich bleib hier."

Jake zuckt die Schultern. "Wie du willst."

Die anderen steigen aus, einer nach dem anderen. Mia wirft dir einen besorgten Blick zu. "Bist du sicher?"

Du nickst.

Die Türen schlagen zu. Du siehst, wie deine Freunde im Regen verschwinden, ihre Gestalten vom Wald verschluckt.

Stille.

Nur der Regen. Das Klopfen auf dem Dach. Dein eigener Atem.

Dann, ein Klopfen. Aber nicht vom Regen.

Jemand klopft ans Fenster.

Du drehst dich um,

<span class="creepy">Ein Gesicht. Direkt vor dem Glas. Vernarbte Haut. Tote Augen.</span>

Bevor du schreien kannst, zersplittert die Scheibe.`);
                
                clearChoices();
                addChoice('...', () => goScene('bad_end_car'));
            },
            
            bad_end_car: function() {
                showStory(`<strong style="color: #8b0000;">GAME OVER</strong>

Niemand hörte deine Schreie.

Als die anderen am nächsten Morgen zum Auto zurückkehrten, fanden sie nur zerbrochenes Glas. Und Blut.

Von dir, keine Spur.

<span class="whisper">Manche sagen, man kann dich immer noch hören. In stürmischen Nächten. Wenn der Regen aufs Autodach trommelt...</span>

***

<em>Das war einer der weniger schmerzhaften Wege zu sterben. Aber die Geschichte deiner Freunde? Die geht weiter...</em>`);
                
                clearChoices();
                document.getElementById('book-link').style.display = 'block';
                addChoice('🔄 Nochmal versuchen', () => location.reload());
            },
            
            suspicious_light: function() {
                gameState.suspicion++;
                showStory(`"Ich traue dem nicht. Kein normales Haus hier draußen..."

"Was sollen wir sonst tun?", fragt Alex pragmatisch. "Hier draußen erfrieren?"

"Er hat recht", sagt Jake und zerknüllt seine Bierdose. "Kein Empfang, kein Auto. Das Licht ist unsere einzige Chance."

Du schaust zu Mia. Sie sieht genauso unwohl aus wie du.

"Vielleicht ist es ja nur ein Förster", sagt sie leise, aber ihre Stimme klingt nicht überzeugt.

KRAAACK!

Ein Ast bricht irgendwo in der Dunkelheit. Alle erstarren.

"Was war das?", flüstert Tiffany.

"Wahrscheinlich nur ein Tier", sagt Jake, aber er klingt nervös. "Los jetzt. Je schneller wir dort sind, desto besser."`);
                
                clearChoices();
                addChoice('Mit den anderen gehen', () => goScene('before_walk'));
            },
            
            before_walk: function() {
                setRain(true);
                showStory(`Ihr steigt aus.

Der Regen trifft dich wie eine kalte Ohrfeige. Innerhalb von Sekunden bist du durchnässt bis auf die Knochen.

Alex aktiviert die Taschenlampe seines Handys, ein schwacher Lichtkegel in der Finsternis. Mia zieht eine kleine LED-Lampe aus ihrem Rucksack.

"Natürlich hast du eine dabei", murmelt Tiffany.

Ihr folgt dem Licht in der Ferne. Der Wald verschluckt euch.

Der Pfad ist kaum erkennbar, Schlamm und Wurzeln, rutschig vom Regen. Die Bäume stehen so dicht, dass ihre Äste wie Finger nach euch greifen.

Dann, eine Bewegung zwischen den Bäumen.`);
                
                clearChoices();
                addChoice('"Stopp! Da ist jemand!"', () => goScene('meet_pa'));
                addChoice('Weitergehen, es ignorieren', () => goScene('ignore_movement'));
            },
            
            ignore_movement: function() {
                showStory(`Du sagst nichts. Vielleicht war es nur ein Tier. Oder deine Fantasie.

Ihr geht weiter. Der Pfad wird steiler, der Schlamm tiefer.

Mia rutscht aus. Alex fängt sie gerade noch auf. Ihre Blicke treffen sich kurz im Taschenlampenlicht.

"Danke", flüstert sie.

KNACK!

Diesmal hören es alle. Ein Ast, der unter einem schweren Gewicht bricht. Nah. Sehr nah.

"Was zum ..."

Eine Gestalt tritt aus dem Unterholz.

Groß. Breitschultrig. Ein Gesicht voller Narben, halb verborgen unter einer Kapuze.`);
                
                thunder();
                clearChoices();
                addChoice('Zurückweichen', () => goScene('meet_pa'));
            },
            
            meet_pa: function() {
                showStory(`Die Gestalt steht einfach da. Reglos. Wasser rinnt über sein vernarbtes Gesicht.

"Wer ... wer sind Sie?", stammelt Jake.

Der Mann mustert euch. Einer nach dem anderen. Sein Blick bleibt kurz bei Tiffany hängen, dann bei Mia.

<span class="creepy">Dann bei dir.</span>

"Panne?", fragt er. Seine Stimme klingt rostig, unbenutzt.

"Ja", sagt Alex schnell. "Unser Auto ist liegengeblieben. Können wir bei Ihnen telefonieren?"

Der Mann nickt langsam. "Haus. Nicht weit."

Er dreht sich um und geht los, ohne auf eine Antwort zu warten.

Ihr tauscht Blicke aus.`);
                
                clearChoices();
                addChoice('Ihm folgen', () => goScene('follow_pa'));
                addChoice('"Wartet. Irgendwas stimmt hier nicht."', () => goScene('hesitate_pa'));
            },
            
            hesitate_pa: function() {
                gameState.suspicion++;
                showStory(`"Wartet. Irgendwas stimmt hier nicht."

Die anderen schauen dich an.

"Was meinst du?", fragt Alex.

"Dieser Typ taucht aus dem Nichts auf. Mitten im Wald. Mitten in der Nacht. Bei diesem Wetter."

"Er wohnt hier", sagt Jake ungeduldig. "Was soll er sonst machen?"

"Und sein Gesicht", fügst du hinzu. "Habt ihr die Narben gesehen?"

Tiffany schluchzt leise. "Ich will nur ins Trockene. Bitte."

Der Mann ist bereits mehrere Meter voraus, verschwindet fast in der Dunkelheit.

"Komm schon", drängt Jake. "Es ist unsere einzige Chance."

Mia berührt deinen Arm. "Er hat recht. Wir können uns nicht aussuchen, wer uns hilft."

Sie gehen los. Du hast keine Wahl.`);
                
                clearChoices();
                addChoice('Widerwillig folgen', () => goScene('follow_pa'));
            },
            
            follow_pa: function() {
                showStory(`Ihr folgt dem Fremden durch den Wald.

Er bewegt sich mit erstaunlicher Sicherheit durch das Unterholz, als könnte er im Dunkeln sehen. Ihr stolpert hinterher, rutscht aus, flucht leise.

"Wie weit noch?", ruft Alex.

"Nicht weit", kommt die knappe Antwort.

Der Pfad wird steiler. Die Bäume stehen dichter. Der Regen peitscht durch die Lücken im Blätterdach.

Dann siehst du es, im Schein von Mias Taschenlampe.

Ein verwitterter Holzpfahl am Wegesrand. Seltsame Symbole eingeritzt.

Und darauf...

<span class="creepy">Ein aufgespießter Tierschädel. Halb verrottet. Leere Augenhöhlen starren dich an.</span>`);
                
                gameState.sawSkull = true;
                clearChoices();
                addChoice('"Was zur Hölle ist das?!"', () => goScene('skull_reaction'));
                addChoice('Nichts sagen, aber das Tempo erhöhen', () => goScene('skull_silent'));
            },
            
            skull_reaction: function() {
                gameState.suspicion++;
                showStory(`"Was zur Hölle ist das?!"

Alle halten an. Mias Taschenlampe zittert, als sie den Schädel anstrahlt.

"Oh Gott", würgt Tiffany.

Der Fremde dreht sich um. Sein Gesicht ist ausdruckslos.

"Markierung", sagt er nur.

"Markierung? Wofür?"

"Grundstücksgrenze."

Jake lacht nervös. "Krasse Dekoration, Alter."

Der Mann starrt ihn an. Sagt nichts. Dreht sich um und geht weiter.

"Ländliche Gegend", flüstert Alex. "Jäger machen sowas manchmal..."

Aber seine Stimme klingt nicht überzeugt.`);
                
                clearChoices();
                addChoice('Weiter folgen, was bleibt dir übrig?', () => goScene('approach_house'));
            },
            
            skull_silent: function() {
                showStory(`Du sagst nichts. Aber du beschleunigst deine Schritte.

Mia hat den Schädel auch gesehen. Eure Blicke treffen sich, wortloses Verstehen. Ihr beide wisst: Das hier ist falsch. Alles daran.

Aber was sollt ihr tun? Zurück zum toten Auto? Allein im Wald warten?

Ein tiefes Knurren hallt durch die Nacht.

Alle erstarren.

"Was war das?", zischt Jake.

Der Fremde hebt die Hand. "Raubtiere", sagt er ruhig. "Bleiben meist fern."

"Meist?!"

"Weiter. Schnell."

Er setzt sich in Bewegung, schneller jetzt. Ihr habt keine Wahl als zu folgen.`);
                
                gameState.heardGrowl = true;
                clearChoices();
                addChoice('Rennen', () => goScene('approach_house'));
            },
            
            approach_house: function() {
                showStory(`Dann seht ihr es.

Das Haus.
